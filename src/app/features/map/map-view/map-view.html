<div *ngIf="desktopModeWarning" class="desktop-warning">
  <h2>Mode bureau non supporté</h2>
  <p>
    Le mode “Afficher le site de bureau” n’est pas compatible avec l’affichage de la carte.
    Veuillez désactiver ce mode dans votre navigateur mobile pour utiliser ParkFinder.
  </p>
</div>

<div class="map-container">
  <div id="map"></div>

  <div class="map-filter-panel">
    <span class="filter-label">Rayon de recherche</span>
    <div class="radius-controls">
      <button (click)="decrementRadius()" [disabled]="filters.maxDistance() === 1">−</button>
      <span class="radius-value">{{ filters.maxDistance() }} km</span>
      <button (click)="incrementRadius()" [disabled]="filters.maxDistance() === 10">+</button>
    </div>
  </div>
</div>
