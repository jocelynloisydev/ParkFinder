<div class="auth-card">
  <h2>Connexion</h2>

  <input type="email" [(ngModel)]="email" placeholder="Adresse email" />
  <input type="password" [(ngModel)]="password" placeholder="Mot de passe" />

  <button class="primary" (click)="submit()">Se connecter</button>

  <!-- Bouton inscription -->
  <button class="secondary" routerLink="/register">
    Créer un compte
  </button>

  <p *ngIf="error" class="error">{{ error }}</p>
</div>
